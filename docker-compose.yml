version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sep490-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wedding_services
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - sep490-network

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    networks:
      - sep490-network
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      mc mb myminio/wedding-assets || true;
      mc anonymous set none myminio/wedding-assets;
      exit 0;
      "
    networks:
      - sep490-network

volumes:
  postgres_data:
  minio_data:

networks:
  sep490-network:
    driver: bridge

